name: Forex Signal Notifier

on:
  schedule:
    - cron: '*/15 * * * *'   # Chay moi 15 phut
  workflow_dispatch:          # Cho phep chay thu cong

permissions:
  contents: write

concurrency:
  group: forex-notifier
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Forex Signal Scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:    ${{ secrets.TELEGRAM_CHAT }}
          TWELVE_DATA_KEY:  ${{ secrets.TWELVE_DATA_KEY }}
          ACCOUNT_SIZE:     ${{ secrets.ACCOUNT_SIZE }}
        run: python forex_notifier.py

      - name: Run Gold PA Bot (he Price Action doc lap cho XAU)
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:    ${{ secrets.TELEGRAM_CHAT }}
          TWELVE_DATA_KEY:  ${{ secrets.TWELVE_DATA_KEY }}
          ACCOUNT_SIZE:     ${{ secrets.ACCOUNT_SIZE }}
        run: python gold_pa_bot.py

      - name: Save signal state and price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_signals.json
          git add price_history.json || true
          git add data/decisions.log || true
          git add gold_pa_state.json || true
          git add data/gold_pa.log || true
          git diff --staged --quiet || git commit -m "chore: update state + price history [skip ci]"
          git pull --rebase -X theirs origin main
          git push
