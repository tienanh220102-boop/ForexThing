name: Forex Signal Notifier

on:
  schedule:
    - cron: '*/15 * * * *'   # Chay moi 15 phut
  workflow_dispatch:          # Cho phep chay thu cong

permissions:
  contents: write
  actions: write   # de dispatch workflow deploy Pages sau khi push state

concurrency:
  group: forex-notifier
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Forex Signal Scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:    ${{ secrets.TELEGRAM_CHAT }}
          TWELVE_DATA_KEY:  ${{ secrets.TWELVE_DATA_KEY }}
          ACCOUNT_SIZE:     ${{ secrets.ACCOUNT_SIZE }}
          VOTING_MODE:      ${{ vars.VOTING_MODE }}   # info (mac dinh/rong) = tham khao, khong actionable | live = bat lai
        run: python forex_notifier.py

      - name: Run Gold PA Bot (he Price Action doc lap cho XAU)
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:    ${{ secrets.TELEGRAM_CHAT }}
          TWELVE_DATA_KEY:  ${{ secrets.TWELVE_DATA_KEY }}
          ACCOUNT_SIZE:     ${{ secrets.ACCOUNT_SIZE }}
          BIAS:             ${{ vars.BIAS }}   # huong trend user cap: UP|DOWN|SIDE|OFF (trong rong = OFF)
        run: python gold_pa_bot.py

      - name: Save signal state and price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_signals.json
          git add price_history.json || true
          git add data/decisions.log || true
          git add gold_pa_state.json || true
          git add data/gold_pa.log || true
          if git diff --staged --quiet; then
            echo "Khong co thay doi state, bo qua commit"
          else
            git commit -m "chore: update state + price history [skip ci]"
            git pull --rebase -X theirs origin main
            git push
            echo "STATE_PUSHED=1" >> "$GITHUB_ENV"
          fi

      # Push bang GITHUB_TOKEN khong tu trigger workflow khac (chong vong lap),
      # nen phai dispatch thu cong de Pages deploy du lieu moi
      - name: Trigger Pages redeploy
        if: env.STATE_PUSHED == '1'
        continue-on-error: true   # 500 tu GitHub API = tam thoi; KHONG duoc lam ca run FAILED
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in 1 2 3; do
            if gh workflow run static.yml --ref main; then
              echo "Dispatched static.yml (lan $i)"; exit 0
            fi
            echo "Dispatch loi (lan $i, thuong HTTP 500 tam thoi) — thu lai sau 5s"
            sleep 5
          done
          echo "Pages redeploy dispatch fail sau 3 lan (non-fatal) — Pages se cap nhat o run sau"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT }}" \
            -d text="🚨 Forex workflow FAILED — run ${{ github.run_id }}. Kiem tra: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

      # ── DEAD-MAN'S SWITCH (chong "he chet am tham") ──────────────────
      # 'Notify on failure' chi bao khi job CHAY ROI LOI. No KHONG cuu duoc ca
      # job khong chay lan nao (cron-job.org chet / GitHub drop / outage) —
      # dung kieu hong da gay vu XAU 11/06.
      # Cach bat:
      #   1. Tao 1 check mien phi tai https://healthchecks.io (Period=15m, Grace=45m)
      #   2. Cau hinh Integration -> Telegram (hoac email) de nhan canh bao
      #   3. Copy ping URL (vd https://hc-ping.com/<uuid>) vao GitHub Secret
      #      ten HEALTHCHECK_URL  (Settings -> Secrets -> Actions)
      # Khi run khoe manh -> ping. Ping ngat qua 15m+grace -> healthchecks.io
      # tu bao bạn. Chua set secret -> buoc nay tu bo qua, khong anh huong gi.
      - name: Heartbeat ping (dead-man's switch)
        if: success()
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HEALTHCHECK_URL" ]; then
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL" > /dev/null \
              && echo "Heartbeat OK — da ping healthchecks.io" \
              || echo "Heartbeat ping that bai (non-fatal, khong chan run)"
          else
            echo "HEALTHCHECK_URL chua set — bo qua heartbeat. Xem comment phia tren de bat dead-man switch."
          fi
