name: Forex Signal Notifier

on:
  schedule:
    - cron: '*/30 * * * *'   # Chay moi 30 phut
  workflow_dispatch:          # Cho phep chay thu cong

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests numpy

      - name: Run Forex Signal Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:  ${{ secrets.TELEGRAM_CHAT }}
        run: python forex_notifier.py

      - name: Save signal state (tranh spam)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_signals.json
          git diff --staged --quiet || git commit -m "chore: update signal state [skip ci]"
          git push
