name: Forex Signal Notifier

on:
  schedule:
    - cron: '*/15 * * * *'   # Chay moi 15 phut
  workflow_dispatch:          # Cho phep chay thu cong

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "yfinance<1.0" requests numpy

      - name: Run Forex Signal Scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:    ${{ secrets.TELEGRAM_CHAT }}
          TWELVE_DATA_KEY:  ${{ secrets.TWELVE_DATA_KEY }}
          ACCOUNT_SIZE:     ${{ secrets.ACCOUNT_SIZE }}
        run: python forex_notifier.py

      - name: Save signal state and price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_signals.json
          git add price_history.json || true
          git diff --staged --quiet || git commit -m "chore: update state + price history [skip ci]"
          git pull --rebase origin main
          git push
